<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="glow-text">AI</span> Background Remover
                </h1>
                <p class="subtitle">Remove backgrounds instantly with AI precision</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-card glass-card">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <h2 class="upload-title">Upload Your Image</h2>
                        <p class="upload-description">Drag and drop or click to select</p>
                        <p class="upload-hint">Supports: JPG, PNG, WebP</p>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </div>
                </div>
            </section>

            <!-- Preview Section -->
            <section class="preview-section" id="previewSection" style="display: none;">
                <h2 class="section-title">Preview</h2>
                <div class="preview-grid">
                    <!-- Original Image -->
                    <div class="preview-card glass-card">
                        <div class="preview-label">Original</div>
                        <div class="image-container">
                            <img id="originalImage" src="" alt="Original image">
                        </div>
                    </div>

                    <!-- Arrow -->
                    <div class="arrow-container">
                        <div class="arrow">
                            <span>→</span>
                        </div>
                    </div>

                    <!-- Processed Image -->
                    <div class="preview-card glass-card">
                        <div class="preview-label">Removed Background</div>
                        <div class="image-container">
                            <img id="processedImage" src="" alt="Processed image">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Action Buttons -->
            <section class="action-section" id="actionSection" style="display: none;">
                <button class="btn btn-primary" id="removeBtn">
                    <span class="btn-icon">⚡</span>
                    Remove Background
                </button>
                <button class="btn btn-secondary" id="downloadBtn" style="display: none;">
                    <span class="btn-icon">⬇</span>
                    Download PNG
                </button>
                <button class="btn btn-tertiary" id="resetBtn">
                    <span class="btn-icon">↻</span>
                    Upload New Image
                </button>
            </section>

            <!-- Loading Spinner -->
            <div class="loader" id="loader" style="display: none;">
                <div class="spinner"></div>
                <p>Processing image with AI...</p>
            </div>

            <!-- Status Message -->
            <div class="status-message" id="statusMessage"></div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p class="footer-text">
                    Developed by <span class="author-name">Sunit Katuwal (BSc CSIT)</span>
                </p>
                <div class="footer-glow"></div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
